<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" /> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Geist', sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-xl shadow-sm p-8 mx-4">
        
        <div class="text-center mb-8">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-24 h-24 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-slate-900">GitHub Issues Tracker</h1>
            <p class="text-slate-500 mt-1">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" placeholder="Enter username" 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" placeholder="••••••••" 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                Sign In
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <div class="relative mb-6">
                <span class="bg-white px-3 text-xs font-bold uppercase tracking-widest text-slate-400 relative z-10">OR</span>
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-100"></div>
                </div>
            </div>
            <div>
                <p class="text-sm mb-2 text-slate-600 italic">Demo Credentials</p>
            </div>
            <div class="p-3 bg-slate-50 rounded-lg">
                
                <p class="text-sm text-slate-400 mt-1"><span class="font-semibold text-black">Username</span> admin</p>
                <p class="text-sm text-slate-400 mt-1"><span class="font-semibold text-black">Password</span> admin123</p>
            </div>
        </div>
    </div>

    <script src="script/index.js"></script>
</body>

</html>
